name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
        env:
          # Provide dummy values so modules that call load_dotenv() don't error.
          # Real API keys are never needed for unit tests (all LLM/embedding
          # calls are mocked or bypassed).
          LLM_API_KEY: dummy
          LLM_BASE_URL: http://localhost
          LLM_MODEL: gpt-4o
          EMBEDDING_API_KEY: dummy
          EMBEDDING_BASE_URL: http://localhost
          EMBEDDING_MODEL: text-embedding-ada-002
          SCHEMA_PATH: schema/customer_service.yaml
